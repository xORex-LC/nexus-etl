# Dataset identifier used by registry entries that point to this sink spec.
dataset: dataset_name

# Sink model used by validation and payload building.
sink:
  # Fields eligible for payload building.
  fields:
    # Internal sink field name.
    - name: sink_field
      # Field type. Supported: string, int, float, bool, object, list.
      type: string
      # Whether field must be present/non-empty before payload building.
      required: false
      # Whether null is accepted when required is true.
      nullable: false
      # External target payload field name. Defaults to name when omitted.
      target: targetField
      # Whether field is generated by runtime. Usually false for payload fields.
      generated: false
      # Optional output serialization metadata. Supported now for bool payload fields.
      serialize:
        # Output mode. Supported: native, literal_map.
        as: native
        # Required only for as: literal_map. Quote keys to keep YAML explicit.
        map:
          "true": "yes"
          "false": "no"
  # Runtime/system fields excluded from payload building.
  system_fields:
    # Internal system field name.
    - name: target_id
      # Field type. Supported: string, int, float, bool, object, list.
      type: string
      # Whether field is required in runtime state.
      required: true
      # Whether null is accepted when required is true.
      nullable: false
      # External target payload field name, normally omitted for system fields.
      target: null
      # Whether field is generated by runtime.
      generated: true
      # Serialization metadata is not allowed for system fields.
      serialize: null
  # Whether fields outside the sink schema are allowed in row state.
  allow_extra: true
