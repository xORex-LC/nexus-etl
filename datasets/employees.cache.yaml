dataset: employees
table: users
schema:
  primary_key: _id
  columns:
    - name: _id
      type: string
      required: true
    - name: _ouid
      type: int
      required: true
    - name: personnel_number
      type: string
      required: true
    - name: last_name
      type: string
      required: true
    - name: first_name
      type: string
      required: true
    - name: middle_name
      type: string
      required: true
    - name: match_key
      type: string
      required: true
    - name: mail
      type: string
      required: true
    - name: user_name
      type: string
      required: true
    - name: phone
      type: string
      required: false
    - name: usr_org_tab_num
      type: string
      required: true
    - name: organization_id
      type: int
      required: true
    - name: account_status
      type: string
      required: false
    - name: deletion_date
      type: datetime
      required: false
    - name: _rev
      type: string
      required: false
    - name: manager_ouid
      type: int
      required: false
    - name: is_logon_disabled
      type: bool
      required: false
    - name: position
      type: string
      required: false
    - name: updated_at
      type: datetime
      required: false
  indexes:
    - name: uidx_users_ouid
      fields: [_ouid]
      unique: true
    - name: uidx_users_match_key
      fields: [match_key]
      unique: true
    - name: uidx_users_tab_num
      fields: [usr_org_tab_num]
      unique: true
    - name: idx_users_personnel_number
      fields: [personnel_number]
      unique: false
    - name: idx_users_organization_id
      fields: [organization_id]
      unique: false
sync:
  dataset: employees
  list_operation_alias: users.list
  report_entity: user
  include_deleted_default: false
  item_key:
    sources: [_id, id]
    ops:
      - op: coalesce
      - op: trim
    required: true
    on_error: error
  soft_delete:
    mode: any_of
    rules:
      - type: field_equals
        field: accountStatus
        value: deleted
        normalize:
          - op: trim
          - op: lower
      - type: field_equals
        field: account_status
        value: deleted
        normalize:
          - op: trim
          - op: lower
      - type: field_not_null
        field: deletionDate
        normalize:
          - op: trim
      - type: field_not_null
        field: deletion_date
        normalize:
          - op: trim
  projection:
    - target: _id
      sources: [_id, id]
      ops:
        - op: coalesce
        - op: trim
      required: true
      on_error: error
    - target: _ouid
      sources: [_ouid, ouid, userId]
      ops:
        - op: coalesce
        - op: to_int
      required: true
      on_error: error
    - target: personnel_number
      sources: [personnel_number, personnelNumber]
      ops:
        - op: coalesce
        - op: trim
      required: true
      on_error: error
    - target: last_name
      sources: [last_name, lastName]
      ops:
        - op: coalesce
        - op: trim
      required: true
      on_error: error
    - target: first_name
      sources: [first_name, firstName]
      ops:
        - op: coalesce
        - op: trim
      required: true
      on_error: error
    - target: middle_name
      sources: [middle_name, middleName]
      ops:
        - op: coalesce
        - op: trim
      required: true
      on_error: error
    - target: match_key
      sources: [match_key, matchKey, _id, id]
      ops:
        - op: coalesce
        - op: trim
      required: true
      on_error: error
    - target: mail
      sources: [mail, email]
      ops:
        - op: coalesce
        - op: trim
      required: true
      on_error: error
    - target: user_name
      sources: [user_name, userName, username, login]
      ops:
        - op: coalesce
        - op: trim
      required: true
      on_error: error
    - target: phone
      sources: [phone, mobile]
      ops:
        - op: coalesce
        - op: trim
      on_error: set_null
    - target: usr_org_tab_num
      sources: [usr_org_tab_num, usrOrgTabNum]
      ops:
        - op: coalesce
        - op: trim
      required: true
      on_error: error
    - target: organization_id
      sources: [organization_id, organizationId, org_id, orgId]
      ops:
        - op: coalesce
        - op: to_int
      required: true
      on_error: error
    - target: account_status
      sources: [account_status, accountStatus]
      ops:
        - op: coalesce
        - op: trim
      on_error: set_null
    - target: deletion_date
      sources: [deletion_date, deletionDate]
      ops:
        - op: coalesce
        - op: trim
      on_error: set_null
    - target: _rev
      sources: [_rev, rev]
      ops:
        - op: coalesce
        - op: trim
      on_error: set_null
    - target: manager_ouid
      sources: [manager_ouid, managerId, manager_id]
      ops:
        - op: coalesce
        - op: to_int
      on_error: set_null
    - target: is_logon_disabled
      sources: [is_logon_disabled, isLogonDisabled]
      ops:
        - op: coalesce
        - op: to_bool
      on_error: set_null
    - target: position
      source: position
      ops:
        - op: trim
      on_error: set_null
    - target: updated_at
      sources: [updated_at, updatedAt]
      ops:
        - op: coalesce
        - op: trim
      on_error: set_null
flags:
  include_deleted: false
