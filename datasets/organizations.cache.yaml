dataset: organizations
table: organizations
schema:
  primary_key: _ouid
  columns:
    - name: _ouid
      type: int
      required: true
    - name: code
      type: string
      required: false
    - name: name
      type: string
      required: false
    - name: parent_id
      type: int
      required: false
    - name: updated_at
      type: datetime
      required: false
  indexes:
    - name: idx_organizations_parent_id
      fields: [parent_id]
      unique: false
sync:
  dataset: organizations
  list_operation_alias: organizations.list
  report_entity: org
  include_deleted_default: false
  item_key:
    sources: [_ouid, ouid, id]
    ops:
      - op: coalesce
      - op: to_int
      - op: to_string
    required: true
    on_error: error
  projection:
    - target: _ouid
      sources: [_ouid, ouid, id]
      ops:
        - op: coalesce
        - op: to_int
      required: true
      on_error: error
    - target: code
      source: code
      ops:
        - op: trim
      on_error: set_null
    - target: name
      source: name
      ops:
        - op: trim
      on_error: set_null
    - target: parent_id
      sources: [parent_id, parentId]
      ops:
        - op: coalesce
        - op: to_int
      on_error: set_null
    - target: updated_at
      sources: [updated_at, updatedAt]
      ops:
        - op: coalesce
        - op: trim
      on_error: set_null
flags:
  include_deleted: false
