dataset: employees
source_columns:
  - raw_id
  - full_name
  - login
  - email_or_phone
  - contacts
  - org
  - manager
  - flags
  - employment
  - extra
mapping:
  rules:
    - target: personnel_number
      source: raw_id
      op: copy
    - targets: [last_name, first_name, middle_name]
      source: full_name
      op: split_name
      args:
        fields: [last_name, first_name, middle_name]
        separator: " "
        allow_comma_format: true
    - target: user_name
      source: login
      op: copy
    - targets: [email, phone]
      sources: [email_or_phone, contacts]
      op: extract_patterns
      args:
        split_pattern: "[;|,]"
        patterns:
          email: "[^\\s,;|]+@[^\\s,;|]+"
          phone: "[+\\d][\\d\\s()\\-]{5,}"
        keyed_prefixes:
          email: "email="
          phone: "phone="
    - target: manager_id
      source: manager
      ops:
        - op: regex_extract
          args:
            pattern: "(?:manager_id|manager)\\s*[:=]\\s*([^;]+)"
            group: 1
        - op: regex_extract
          args:
            pattern: "\\d+"
            group: 0
    - target: is_logon_disable
      source: flags
      ops:
        - op: regex_extract
          args:
            pattern: "disabled\\s*[:=]\\s*([^;]+)"
            group: 1
        - op: map_dict
          args:
            casefold: true
            mapping:
              "true": "true"
              "1": "true"
              "yes": "true"
              "y": "true"
              "on": "true"
              "false": "false"
              "0": "false"
              "no": "false"
              "n": "false"
              "off": "false"
    - target: position
      source: employment
      op: regex_extract
      args:
        pattern: "role\\s*[:=]\\s*([^;]+)"
        group: 1
    - targets: [password, organization_id, usr_org_tab_num]
      source: extra
      op: parse_kv_pairs
      args:
        sep: ";"
        kv_sep: "="
        keys:
          password: password
          organization_id: org_id
          usr_org_tab_num: tab
    - target: avatar_id
      op: const
      args:
        value: null
