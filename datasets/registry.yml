targets:
  ankey: targets/ankey.target.yaml

datasets:
  employees:
    source: employees.source.yaml
    mapping: employees.mapping.yaml
    normalize: employees.normalize.yaml
    enrich: employees.enrich.yaml
    validate: employees.validate.yaml
    match: employees.match.yaml
    resolve: employees.resolve.yaml
    sink: employees.sink.yaml
    build_options:
      enrich:
        require_match_key: true
    report:
      identity_label: match_key
      conflict_code: MATCH_CONFLICT
      conflict_field: matchKey
    apply:
      operation_alias: users.upsert
      payload:
        source: sink
        defaults:
          avatarId: null
        conditional_fields:
          - password
      params:
        mode: target_id
    diagnostics:
      - code: INVALID_AVATAR_ID
        system_code: DATA_INVALID
        severity: error
        message: "avatarId must be empty or null"
      - code: USR_ORG_TAB_CONFLICT
        system_code: DATA_INVALID
        severity: error
        message: "usr_org_tab_num conflicts with existing row"
      - code: TARGET_ID_MISSING
        system_code: DATA_INVALID
        severity: error
        message: "target_id is required"
      - code: MATCH_KEY_MISSING
        system_code: DATA_INVALID
        severity: error
        message: "match_key is required"
      - code: INVALID_INT
        system_code: DATA_INVALID
        severity: error
        message: "invalid integer value"
      - code: INVALID_EMAIL
        system_code: DATA_INVALID
        severity: error
        message: "email has invalid format"
      - code: INVALID_BOOLEAN
        system_code: DATA_INVALID
        severity: error
        message: "invalid boolean value"

cache:
  version: 1
  policy:
    refresh:
      with_deps_default: true
    drift:
      mode: strict
      on_hash_mismatch: fail
      rebuild_scope: dataset
    clear:
      cascade_default: false
      preserve_service_tables: true
      reset_meta_on_clear: true
    status:
      enable_orphan_check: true
      degraded_on_hash_mismatch: true
  datasets:
    organizations:
      cache_spec: organizations.cache.yaml
      depends_on: []
      order_hint: 10
      allow_partial_refresh: false
      enabled: true
    employees:
      cache_spec: employees.cache.yaml
      depends_on: [organizations]
      order_hint: 20
      allow_partial_refresh: false
      enabled: true

dictionaries:
  version: 1
  items:
    organizations:
      spec: dictionaries/organizations.dictionary.yaml
      enabled: true
