dataset: employees
normalize:
  on_error: warn
  rules:
    - field: email
      ops:
        - op: trim
    - field: last_name
      ops:
        - op: trim
    - field: first_name
      ops:
        - op: trim
    - field: middle_name
      ops:
        - op: trim
    - field: is_logon_disable
      ops:
        - op: to_bool
    - field: user_name
      ops:
        - op: trim
    - field: phone
      ops:
        - op: trim
    - field: password
      ops:
        - op: trim
    - field: personnel_number
      ops:
        - op: trim
    - field: manager_id
      ops:
        - op: trim
    - field: organization_id
      ops:
        - op: int_if_digits
    - field: position
      ops:
        - op: trim
    - field: avatar_id
      ops:
        - op: trim
    - field: usr_org_tab_num
      ops:
        - op: trim
