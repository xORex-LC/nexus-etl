dataset: employees
normalize:
  on_error: warn
  rules:
    - field: email
      ops:
        - op: trim
    - field: last_name
      ops:
        - op: trim
        - op: title
    - field: first_name
      ops:
        - op: trim
        - op: title
    - field: middle_name
      ops:
        - op: trim
        - op: title
    - field: is_logon_disable
      ops:
        - op: parse_bool
          args:
            true_values: ["true", "1", "yes", "y"]
            false_values: ["false", "0", "no", "n"]
            casefold: true
            trim: true
    - field: user_name
      ops:
        - op: trim
    - field: phone
      ops:
        - op: trim
    - field: password
      ops:
        - op: trim
    - field: personnel_number
      ops:
        - op: trim
    - field: manager_id
      ops:
        - op: trim
    - field: organization_id
      ops:
        - op: map_each
          args:
            ops:
              - op: trim
        - op: compact
        - op: last
    - field: position
      ops:
        - op: trim
        - op: title
    - field: avatar_id
      ops:
        - op: trim
    - field: usr_org_tab_num
      ops:
        - op: trim
