dataset: employees
match:
  identity_rules:
    - name: match_key
      primary: match_key
      fields:
        - match_key
  ignored_fields:
    - updated_at
    - _rev
    - deletion_date
    - account_status
  source_dedup:
    enabled: true
    on_duplicate: warn
    on_conflict: error
  fuzzy:
    enabled: false
    blocking_keys: []
    comparators: {}
    weights: {}
    accept_threshold: 0.9
    review_threshold: 0.7
    tie_delta: 0.05
    max_candidates: 50
    top_k: 3
    score_round: 4
