# Декларативная спецификация target-провайдера Ankey IDM REST API.
#
# Загружается через connector.domain.target_dsl.load_target_spec("ankey").
# Что описывается здесь: capabilities, fault_rules, retry_rules, retry_config,
#                         redaction, health, operations.
# Что остаётся в Python:  auth, paging strategy, mutations (функции), wiring.

target_type: ankey

capabilities:
  - check
  - execute
  - read_paged

health:
  operation_alias: health.check

# ---------------------------------------------------------------------------
# Классификация ошибок: HTTP-статус / error code → FaultKind
# Порядок имеет значение: первое совпадение по error_code приоритетнее статуса.
# ---------------------------------------------------------------------------
fault_rules:
  # Аутентификация / авторизация
  - fault_kind: AUTH
    match_status: 401
  - fault_kind: PERMISSION
    match_status: 403
  # Ошибки данных
  - fault_kind: DATA
    match_status: 400
  - fault_kind: DATA
    match_status: 422
  - fault_kind: NOT_FOUND
    match_status: 404
  - fault_kind: CONFLICT
    match_status: 409
  # Ограничение частоты запросов
  - fault_kind: THROTTLE
    match_status: 429
  # Временные ошибки (серверные + сетевые)
  - fault_kind: TRANSIENT
    match_status_range: [500, 599]
  - fault_kind: TRANSIENT
    match_error_code: NETWORK_ERROR

# ---------------------------------------------------------------------------
# Параметры механики retry (backoff, jitter, лимиты)
# ---------------------------------------------------------------------------
retry_config:
  max_attempts: 3
  backoff_base: 0.5
  backoff_max: 30.0
  jitter: true

# ---------------------------------------------------------------------------
# Правила реакции: FaultKind → RetryDirective
# mutation ссылается на функцию по имени, зарегистрированную в TargetMutationRegistry.
# ---------------------------------------------------------------------------
retry_rules:
  - directive: RETRY_BACKOFF
    match_fault: TRANSIENT
  - directive: RETRY_AFTER
    match_fault: THROTTLE
  # Конфликт идентификатора ресурса — сгенерировать новый UUID и повторить
  - directive: RETRY_BACKOFF
    match_fault: CONFLICT
    match_reason: resourceexists
    mutation: regenerate_target_id
  - directive: NO_RETRY
    match_fault: AUTH
  - directive: NO_RETRY
    match_fault: PERMISSION
  - directive: NO_RETRY
    match_fault: DATA
  - directive: NO_RETRY
    match_fault: NOT_FOUND
  - directive: NO_RETRY
    match_fault: CONFLICT

# ---------------------------------------------------------------------------
# Правила маскирования для безопасного логирования
# ---------------------------------------------------------------------------
redaction:
  body_mode: truncated
  forbidden_metadata_keys:
    - authorization
    - cookie
    - set-cookie
    - x-api-key
    - x-ankey-password
  forbidden_fields:
    - password
    - token
    - secret
    - api_key

# ---------------------------------------------------------------------------
# Каталог операций
# alias инжектируется автоматически из ключа словаря — не указывать вручную.
# kind по умолчанию "http".
# ---------------------------------------------------------------------------
operations:
  health.check:
    expected_statuses: [200]
    data:
      method: GET
      path_template: /ankey/managed/user
      query_defaults:
        page: "1"
        rows: "1"
        _queryFilter: "true"

  users.list:
    expected_statuses: [200]
    data:
      method: GET
      path_template: /ankey/managed/user
      query_defaults:
        _queryFilter: "true"

  organizations.list:
    expected_statuses: [200]
    data:
      method: GET
      path_template: /ankey/managed/organization
      query_defaults:
        _queryFilter: "true"

  users.upsert:
    expected_statuses: [200, 201]
    data:
      method: PUT
      path_template: /ankey/managed/user/{target_id}
      query_defaults:
        _prettyPrint: "true"
        decrypt: "false"
