# Dataset identifier used by registry entries that point to this validate spec.
dataset: dataset_name

# Validation rules applied after enrichment.
validate:
  # Per-field validation checks.
  field_checks:
    # Field to validate.
    - field: sink_field
      # Operation pipeline. Operations should raise/emit issues when validation fails.
      ops: []
      # Diagnostic behavior for this check. Supported: error, warn.
      on_error: error
  # Conditional validation checks.
  conditional_checks:
    # Condition payload interpreted by the validation implementation.
    - when: {}
      # Operation pipeline applied when condition matches.
      ops: []
      # Diagnostic behavior for this check. Supported: error, warn.
      on_error: error
