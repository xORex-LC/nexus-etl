dataset: employees
source:
  type: file
  format: csv
  has_header: false
  location_ref: EMPLOYEES_SOURCE_PATH
  options:
    delimiter: ","
    encoding: "utf-8-sig"
  fields:
    - name: raw_id
      type: string
      required: true
      nullable: false
    - name: full_name
      type: string
      required: true
      nullable: false
    - name: login
      type: string
      required: true
      nullable: false
    - name: email_or_phone
      type: string
    - name: contacts
      type: string
    - name: org
      type: string
    - name: manager
      type: string
    - name: flags
      type: string
    - name: employment
      type: string
    - name: extra
      type: string
