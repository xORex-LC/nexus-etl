# ============================================================================
# nexus-etl ECS logging taxonomy — ACTIONS (словарь event.action)
# ----------------------------------------------------------------------------
# Машинно-авторитетный источник значений `event.action`.
# Covers docs/dev/layers/observability/ecs-logging-taxonomy event dictionary
# and canonical action tables from every zone document.
# ============================================================================

