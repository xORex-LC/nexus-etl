[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (medium, real components)
    e2e: End-to-end tests (slow, full pipeline)
    architecture: Architecture tests (boundaries)
    performance: Performance tests (very slow)
    slow: Slow tests (deselect with '-m "not slow"')
